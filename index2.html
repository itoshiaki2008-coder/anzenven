<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .tbl {
            font-size: 14px; /* Changed from 12px to 14px */
        }
        .tbl th {
            font-size: 13px; /* Changed from 11px to 13px */
        }
        /* Change inline font sizes */
        td[style*='font-size:10px'] {
            font-size: 11px;
        }
    </style>
</head>
<body>
    <table class="tbl">
        <thead>
            <tr>
                <th>Header 1</th>
                <th>Header 2</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td style="font-size:11px;">Row 1 Col 1</td>
                <td style="font-size:11px;">Row 1 Col 2</td>
            </tr>
            <tr>
                <td style="font-size:11px;">Row 2 Col 1</td>
                <td style="font-size:11px;">Row 2 Col 2</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
